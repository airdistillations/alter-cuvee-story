<html class="staticrypt-html" lang="en">

    <title>ALTER Cuvée — Private viewing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />

    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />

    <meta http-equiv="pragma" content="no-cache" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..600,0..100&family=Hanken+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        :root{
            --cream:     #FBF8F2;
            --cream-2:   #F0E8D7;
            --taupe:     #8A7558;
            --taupe-dp:  #6E5C43;
            --taupe-sf:  #C9B894;
            --ink:       #1F1913;
            --gold:      #C9A34C;
            --serif:     "Fraunces", "Didot", Cambria, Georgia, serif;
            --sans:      "Hanken Grotesk", "Helvetica Neue", system-ui, sans-serif;
            --mono:      "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace;
        }

        *{ box-sizing: border-box; }

        html, body{
            height: 100%;
            margin: 0;
        }

        body.staticrypt-body{
            font-family: var(--sans);
            color: var(--ink);
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(201, 184, 148, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(138, 117, 88, 0.18) 0%, transparent 55%),
                linear-gradient(180deg, rgba(251,248,242,1) 0%, rgba(240,232,215,1) 100%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* paper grain */
        body.staticrypt-body::after{
            content: "";
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0.05;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch' seed='7'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.13  0 0 0 0 0.09  0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
            background-size: 240px 240px;
        }

        .staticrypt-content{
            position: relative;
            z-index: 2;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px 80px;
            background: transparent;
            font-family: var(--sans);
        }

        .staticrypt-page{
            width: 100%;
            max-width: 440px;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .staticrypt-form{
            position: relative;
            background: rgba(251, 248, 242, 0.6);
            border: 1px solid rgba(138, 117, 88, 0.15);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            margin: 0 auto;
            padding: 56px 40px 44px;
            text-align: center;
            box-shadow:
                0 1px 0 rgba(138, 117, 88, 0.04),
                0 40px 80px -40px rgba(28, 22, 18, 0.18);
        }

        /* Logo mark */
        .at-mark{
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            display: block;
        }

        /* Eyebrow label */
        .at-eyebrow{
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--taupe);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .at-eyebrow::before,
        .at-eyebrow::after{
            content: "";
            width: 24px;
            height: 1px;
            background: var(--taupe-sf);
        }

        .staticrypt-instructions{
            margin: 0 0 36px;
        }

        .staticrypt-title{
            font-family: var(--serif);
            font-variation-settings: "opsz" 144, "SOFT" 40, "wght" 420;
            font-size: 30px;
            line-height: 1.15;
            color: var(--taupe-dp);
            margin: 0 0 14px;
            font-weight: 400;
            letter-spacing: 0.005em;
        }
        .staticrypt-title em{
            font-style: italic;
            font-variation-settings: "opsz" 144, "SOFT" 100, "wght" 380;
            color: var(--taupe);
        }

        .staticrypt-instructions p:not(.staticrypt-title){
            font-family: var(--serif);
            font-style: italic;
            font-variation-settings: "opsz" 48, "SOFT" 60, "wght" 360;
            font-size: 14.5px;
            color: var(--taupe);
            line-height: 1.55;
            margin: 0;
            letter-spacing: 0.01em;
        }

        .staticrypt-hr{
            display: none;
        }

        .staticrypt-password-container{
            position: relative;
            background: transparent;
            width: 100%;
            border: 0;
            border-bottom: 1px solid rgba(138, 117, 88, 0.3);
            margin: 0 0 24px;
            transition: border-color 0.3s ease;
        }
        .staticrypt-password-container:focus-within{
            border-bottom-color: var(--taupe-dp);
        }

        .staticrypt-form input[type="password"],
        .staticrypt-form input[type="text"]{
            background: transparent;
            border: 0;
            outline: 0;
            padding: 14px 40px 14px 0;
            width: 100%;
            font-family: var(--sans);
            font-size: 15px;
            letter-spacing: 0.05em;
            color: var(--ink);
            text-align: center;
        }
        .staticrypt-form input[type="password"]::placeholder,
        .staticrypt-form input[type="text"]::placeholder{
            color: rgba(138, 117, 88, 0.55);
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .staticrypt-toggle-password-visibility{
            cursor: pointer;
            height: 18px;
            width: 18px;
            opacity: 0.5;
            padding: 12px;
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            transition: opacity 0.25s ease;
        }
        .staticrypt-toggle-password-visibility:hover{
            opacity: 0.85;
        }

        label.staticrypt-remember{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 0 0 22px;
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--taupe);
            cursor: pointer;
            user-select: none;
        }
        .staticrypt-remember input[type="checkbox"]{
            transform: scale(1.1);
            accent-color: var(--taupe-dp);
            margin: 0;
        }

        .staticrypt-form .staticrypt-decrypt-button{
            display: inline-block;
            width: 100%;
            border: 1px solid var(--ink);
            background: var(--ink);
            color: var(--cream);
            padding: 16px 24px;
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s ease, color 0.3s ease, letter-spacing 0.4s cubic-bezier(0.22,1,0.36,1);
            outline: 0;
        }
        .staticrypt-form .staticrypt-decrypt-button:hover,
        .staticrypt-form .staticrypt-decrypt-button:focus-visible{
            background: var(--cream);
            color: var(--ink);
            letter-spacing: 0.34em;
        }

        .at-footer{
            margin-top: 36px;
            font-family: var(--mono);
            font-size: 9.5px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(138, 117, 88, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .at-footer .dot{
            width: 3px; height: 3px;
            background: var(--taupe-sf);
            border-radius: 999px;
        }
        .at-footer a{
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(138, 117, 88, 0.3);
            transition: color 0.25s ease, border-color 0.25s ease;
        }
        .at-footer a:hover{
            color: var(--taupe-dp);
            border-bottom-color: var(--taupe-dp);
        }

        /* ornament */
        .at-diamond{
            display: inline-block;
            width: 120px;
            height: 1px;
            background: var(--taupe-sf);
            margin: 8px 0 28px;
            position: relative;
        }
        .at-diamond::before{
            content: "◆";
            position: absolute;
            left: 50%;
            top: -8px;
            transform: translateX(-50%);
            font-size: 9px;
            color: var(--taupe);
        }

        .staticrypt-spinner-container{
            height: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .staticrypt-spinner{
            width: 28px;
            height: 28px;
            border: 1px solid rgba(138, 117, 88, 0.25);
            border-top-color: var(--taupe-dp);
            border-radius: 999px;
            animation: at-spin 0.9s linear infinite;
        }
        @keyframes at-spin{
            100%{ transform: rotate(360deg); }
        }

        .hidden{ display: none !important; }

        @media (max-width: 520px){
            .staticrypt-form{ padding: 40px 24px 32px; }
            .staticrypt-title{ font-size: 24px; }
        }

        /* Ensure mobile iOS doesn't zoom the input */
        @media screen and (-webkit-min-device-pixel-ratio: 0){
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{
                font-size: 16px;
            }
        }
    </style>
</head>
